<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>来店アンケート | {{ store_name }}</title>
  <style>
    :root { --primary:#0D9488; --primary-dark:#0F766E; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Hiragino Kaku Gothic ProN','Meiryo',sans-serif; background:#F0FDFA; color:#111827; }
    .wrap { max-width:560px; margin:0 auto; padding:18px 16px 40px; }
    .head { text-align:center; padding:18px 0 8px; }
    .head .logo { max-width:100%; width:auto; max-height:210px; margin:0 auto 6px; display:block; }
    .head h1 { font-size:20px; font-weight:800; margin:0 0 4px; color:#0F766E; }
    .head p { font-size:13px; color:#6b7280; margin:0; }
    .card { background:#fff; border:1px solid #e5e7eb; border-radius:14px; padding:18px 16px; box-shadow:0 2px 10px rgba(13,148,136,0.06); margin-top:14px; }
    .field { margin-bottom:16px; }
    .field > label { display:block; font-size:13px; font-weight:700; color:#374151; margin-bottom:6px; }
    .field .req { color:#ef4444; font-size:11px; margin-left:4px; }
    input[type=text], input[type=tel], input[type=email], select, textarea { width:100%; border:1px solid #d1d5db; border-radius:9px; padding:11px 12px; font-size:15px; background:#fff; color:#111827; }
    input:focus, select:focus, textarea:focus { outline:none; border-color:var(--primary); box-shadow:0 0 0 3px rgba(13,148,136,0.12); }
    textarea { min-height:80px; resize:vertical; }
    .checks { display:flex; flex-wrap:wrap; gap:8px; }
    .chk { display:inline-flex; align-items:center; gap:6px; border:1.5px solid #d1d5db; border-radius:999px; padding:8px 14px; font-size:13px; cursor:pointer; user-select:none; background:#fff; }
    .chk input { width:auto; margin:0; accent-color:var(--primary); }
    .chk.on { border-color:var(--primary); background:#F0FDFA; color:#0F766E; font-weight:700; }
    .other-input { margin-top:8px; }
    .sub-input { margin-top:8px; }
    .btn { width:100%; border:none; background:var(--primary); color:#fff; border-radius:10px; padding:14px; font-size:16px; font-weight:800; cursor:pointer; margin-top:6px; }
    .btn:hover { background:var(--primary-dark); }
    .btn:disabled { opacity:0.6; cursor:default; }
    .done { text-align:center; padding:40px 16px; }
    .done .ico { font-size:54px; }
    .done h2 { color:#0F766E; font-size:20px; margin:12px 0 6px; }
    .done p { color:#6b7280; font-size:14px; }
    .err { background:#fee2e2; color:#b91c1c; border:1px solid #fca5a5; border-radius:8px; padding:9px 12px; font-size:13px; margin-bottom:12px; display:none; }
    .err.show { display:block; }
    .foot { text-align:center; color:#9ca3af; font-size:11px; margin-top:18px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <img class="logo" id="store-logo" src="/api/public/company-logo/{{ store_id }}" alt="" onerror="this.style.display='none'">
      <p>ご来店ありがとうございます。お部屋探しのご希望をお聞かせください。</p>
    </div>

    <div id="form-card" class="card">
      <div id="err" class="err"></div>
      <div id="fields"></div>
      <button id="submit-btn" class="btn" onclick="submitForm()">この内容で送信する</button>
    </div>

    <div id="done-card" class="done" style="display:none;">
      <div class="ico">✅</div>
      <h2>送信しました</h2>
      <p>担当スタッフにお知らせしました。<br>このままお待ちください。</p>
    </div>

    <div class="foot">Powered by ミエルーム</div>
  </div>

<script>
const STORE_ID = {{ store_id }};
const FIELDS = {{ fields_json | safe }};

function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function showErr(m){ const e=document.getElementById('err'); e.textContent=m; e.classList.add('show'); window.scrollTo(0,0); }

/* チェック項目のHTML（押すと色が付くピル型） */
function checksHTML(idx, checks, withOther){
  let h = '<div class="checks">';
  (checks||[]).forEach((c,ci)=>{
    h += `<label class="chk"><input type="checkbox" data-f="${idx}" data-c="${ci}" onchange="this.closest('.chk').classList.toggle('on', this.checked)">${esc(c)}</label>`;
  });
  if(withOther){
    h += `<label class="chk"><input type="checkbox" data-f="${idx}" data-other="1"
            onchange="this.closest('.chk').classList.toggle('on', this.checked); const o=document.getElementById('other-${idx}'); o.style.display=this.checked?'block':'none'; if(this.checked) o.focus();">その他</label>`;
  }
  h += '</div>';
  if(withOther) h += `<input type="text" id="other-${idx}" class="other-input" placeholder="その他の内容をご記入ください" style="display:none;">`;
  return h;
}

function renderForm(){
  const box=document.getElementById('fields');
  box.innerHTML = FIELDS.map((f,i)=>{
    if(f.enabled===false) return '';
    const req = f.required ? '<span class="req">必須</span>' : '';
    let body='';
    const ph = esc(f.placeholder||'');
    if(f.type==='select'){
      body = `<select id="f-${i}"><option value="">選択してください</option>${(f.options||[]).map(o=>`<option>${esc(o)}</option>`).join('')}</select>`;
    } else if(f.type==='textarea'){
      body = `<textarea id="f-${i}" placeholder="${ph}"></textarea>`;
    } else if(f.type==='checks'){
      body = checksHTML(i, f.checks, !!f.other);
    } else if(f.type==='text_checks'){
      body = `<input type="text" id="f-${i}" placeholder="${ph}">` + `<div class="sub-input">${checksHTML(i, f.checks, false)}</div>`;
    } else if(f.type==='checks_textarea'){
      body = checksHTML(i, f.checks, false) + `<textarea id="f-${i}" class="sub-input" placeholder="${ph}"></textarea>`;
    } else {
      const t = (f.type==='tel'||f.type==='email') ? f.type : 'text';
      body = `<input type="${t}" id="f-${i}" placeholder="${ph}" ${t==='tel'?'inputmode="tel"':''}>`;
    }
    return `<div class="field"><label>${esc(f.label)}${req}</label>${body}</div>`;
  }).join('');
}

/* 回答の収集：テキスト＋チェックを「値、チェック1、チェック2」の形でまとめる */
function collectValue(f, i){
  const parts=[];
  const inp=document.getElementById('f-'+i);
  if(inp && inp.value && inp.value.trim()) parts.push(inp.value.trim());
  document.querySelectorAll(`input[type=checkbox][data-f="${i}"]:checked`).forEach(cb=>{
    if(cb.dataset.other==='1'){
      const o=document.getElementById('other-'+i);
      parts.push('その他' + (o && o.value.trim() ? '（'+o.value.trim()+'）' : ''));
    } else {
      parts.push((f.checks||[])[+cb.dataset.c] || '');
    }
  });
  return parts.filter(Boolean).join('、');
}

async function submitForm(){
  const answers=[];
  let nameVal='';
  for(let i=0;i<FIELDS.length;i++){
    const f=FIELDS[i];
    if(f.enabled===false) continue;
    const val=collectValue(f, i);
    if(f.required && !val){ showErr(`「${f.label}」を入力してください。`); return; }
    if(f.key==='customer_name') nameVal=val;
    if(val) answers.push({ key:f.key||('q'+i), label:f.label, value:val });
  }
  if(!nameVal){ showErr('お名前を入力してください。'); return; }
  const btn=document.getElementById('submit-btn'); btn.disabled=true; btn.textContent='送信中…';
  try{
    const r=await fetch('/api/visit/'+STORE_ID, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({answers})});
    const j=await r.json(); if(!r.ok) throw new Error(j.error||'送信に失敗しました');
    document.getElementById('form-card').style.display='none';
    document.getElementById('done-card').style.display='block';
    window.scrollTo(0,0);
  }catch(e){ showErr(e.message||'送信に失敗しました。通信環境をご確認ください。'); btn.disabled=false; btn.textContent='この内容で送信する'; }
}

renderForm();
</script>
</body>
</html>
