{% extends "base.html" %}
{% block title %}問い合わせ自動返信 - IeAI{% endblock %}
{% block content %}

<div class="mb-6">
  <a href="/dashboard" class="text-sm text-gray-400 hover:text-gray-600">← ダッシュボードに戻る</a>
</div>

<div class="max-w-4xl mx-auto">
  <div class="mb-8">
    <h1 class="text-2xl font-bold text-gray-900 flex items-center gap-3">
      <span class="w-10 h-10 bg-green-50 rounded-xl flex items-center justify-center">
        <svg class="w-5 h-5 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>
      </span>
      問い合わせ 自動返信
    </h1>
    <p class="text-gray-500 mt-2">お客様からの問い合わせを貼り付けると、丁寧な返信メールをAIが自動作成します。</p>
  </div>

  <div class="grid md:grid-cols-2 gap-8">
    <div class="bg-white rounded-2xl p-8 shadow-sm border border-gray-100">
      <h2 class="font-semibold text-gray-700 mb-5">問い合わせ内容を入力</h2>
      <form method="POST" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1">会社名</label>
          <input type="text" name="company" placeholder="例：株式会社〇〇不動産" class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1">担当者名</label>
          <input type="text" name="staff" placeholder="例：山田 太郎" class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1">お客様の問い合わせ内容</label>
          <textarea name="inquiry" rows="10" placeholder="例：先日、御社のサイトで渋谷区の3LDKマンションを拝見しました。価格と内見について教えてください。また、ペット可かどうかも気になっています。" class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 resize-none"></textarea>
        </div>
        <button type="submit" class="w-full gradient-bg text-white py-3 rounded-xl font-semibold hover:opacity-90 transition flex items-center justify-center gap-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
          </svg>
          返信メールを生成する
        </button>
      </form>
    </div>

    <div class="bg-white rounded-2xl p-8 shadow-sm border border-gray-100">
      <h2 class="font-semibold text-gray-700 mb-5">生成された返信メール</h2>
      {% if result %}
        <div class="result-box text-sm text-gray-700 bg-gray-50 rounded-xl p-5 border border-gray-100 max-h-[500px] overflow-y-auto">{{ result }}</div>
        <button onclick="navigator.clipboard.writeText(document.querySelector('.result-box').innerText)" class="mt-4 w-full border border-gray-200 text-gray-600 py-2.5 rounded-xl text-sm font-medium hover:bg-gray-50 transition">
          コピーする
        </button>
      {% else %}
        <div class="flex flex-col items-center justify-center h-64 text-gray-300">
          <svg class="w-16 h-16 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
          </svg>
          <p class="text-sm">問い合わせ内容を入力して生成ボタンを押してください</p>
        </div>
      {% endif %}
    </div>
  </div>
</div>

{% endblock %}
