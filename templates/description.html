{% extends "base.html" %}
{% block title %}物件説明文 自動生成 - IeAI{% endblock %}
{% block content %}

<div class="mb-6">
  <a href="/dashboard" class="text-sm text-gray-400 hover:text-gray-600">← ダッシュボードに戻る</a>
</div>

<div class="max-w-4xl mx-auto">
  <div class="mb-8">
    <h1 class="text-2xl font-bold text-gray-900 flex items-center gap-3">
      <span class="w-10 h-10 bg-blue-50 rounded-xl flex items-center justify-center">
        <svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
        </svg>
      </span>
      物件説明文 自動生成
    </h1>
    <p class="text-gray-500 mt-2">物件情報を入力するとAIがキャッチコピー・紹介文・おすすめポイントを自動作成します。</p>
  </div>

  <div class="grid md:grid-cols-2 gap-8">
    <!-- 入力フォーム -->
    <div class="bg-white rounded-2xl p-8 shadow-sm border border-gray-100">
      <h2 class="font-semibold text-gray-700 mb-5">物件情報を入力</h2>
      <form method="POST" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1">物件種別</label>
          <select name="type" class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500">
            <option>マンション（中古）</option>
            <option>マンション（新築）</option>
            <option>一戸建て（中古）</option>
            <option>一戸建て（新築）</option>
            <option>土地</option>
            <option>投資用物件</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1">所在地</label>
          <input type="text" name="location" placeholder="例：東京都渋谷区代々木" class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500">
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">築年数</label>
            <input type="number" name="age" placeholder="例：10" class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">間取り</label>
            <input type="text" name="layout" placeholder="例：3LDK" class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500">
          </div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">専有面積 (㎡)</label>
            <input type="text" name="area" placeholder="例：75.5" class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">価格 (万円)</label>
            <input type="text" name="price" placeholder="例：4500" class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500">
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1">特徴・設備（自由入力）</label>
          <textarea name="features" rows="3" placeholder="例：南向き、リフォーム済み、駅徒歩5分、オートロック、宅配ボックス" class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 resize-none"></textarea>
        </div>
        <button type="submit" class="w-full gradient-bg text-white py-3 rounded-xl font-semibold hover:opacity-90 transition flex items-center justify-center gap-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
          </svg>
          AIで説明文を生成する
        </button>
      </form>
    </div>

    <!-- 結果 -->
    <div class="bg-white rounded-2xl p-8 shadow-sm border border-gray-100">
      <h2 class="font-semibold text-gray-700 mb-5">生成結果</h2>
      {% if result %}
        <div class="result-box text-sm text-gray-700 bg-gray-50 rounded-xl p-5 border border-gray-100 max-h-[500px] overflow-y-auto">{{ result }}</div>
        <button onclick="navigator.clipboard.writeText(document.querySelector('.result-box').innerText)" class="mt-4 w-full border border-gray-200 text-gray-600 py-2.5 rounded-xl text-sm font-medium hover:bg-gray-50 transition">
          コピーする
        </button>
      {% else %}
        <div class="flex flex-col items-center justify-center h-64 text-gray-300">
          <svg class="w-16 h-16 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
          </svg>
          <p class="text-sm">物件情報を入力して生成ボタンを押してください</p>
        </div>
      {% endif %}
    </div>
  </div>
</div>

{% endblock %}
