<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>新しいパスワード設定 | 管理ポータル</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: linear-gradient(135deg, #0D4A48 0%, #115E59 40%, #0F766E 100%); min-height: 100vh; font-family: system-ui, -apple-system, sans-serif; }
    .card { background: #fff; border-radius: 20px; box-shadow: 0 24px 64px rgba(0,0,0,0.3); padding: 48px 40px; width: 100%; max-width: 420px; }
    .input-field { width: 100%; border: 1.5px solid #d1d5db; border-radius: 10px; padding: 12px 16px; font-size: 15px; color: #111827; outline: none; transition: border-color 0.2s, box-shadow 0.2s; background: #f9fafb; box-sizing: border-box; }
    .input-field:focus { border-color: #0D9488; box-shadow: 0 0 0 3px rgba(22,163,74,0.15); background: #fff; }
    .btn-primary { width: 100%; background: #0D9488; color: #fff; border: none; border-radius: 10px; padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; transition: background 0.2s; }
    .btn-primary:hover { background: #0F766E; }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
  <div class="card">
    <div class="text-center mb-8">
      <div style="width:64px;height:64px;background:linear-gradient(135deg,#0D9488,#0F766E);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;box-shadow:0 8px 24px rgba(22,163,74,0.35);">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-gray-900">新しいパスワードを設定</h1>
    </div>

    {% if expired %}
    <div style="background:#fee2e2; border:1px solid #fca5a5; border-radius:8px; padding:16px; margin-bottom:20px; color:#b91c1c; font-size:14px; text-align:center;">
      {{ error }}
    </div>
    <p class="text-center text-sm">
      <a href="/forgot-password" class="text-teal-700 font-semibold hover:underline">パスワードリセットをやり直す</a>
    </p>
    {% else %}

    {% if error %}
    <div style="background:#fee2e2; border:1px solid #fca5a5; border-radius:8px; padding:12px 16px; margin-bottom:20px; color:#b91c1c; font-size:14px; text-align:center;">
      {{ error }}
    </div>
    {% endif %}

    <form method="POST">
      <div class="mb-4">
        <label class="block text-sm font-semibold text-gray-700 mb-2">新しいパスワード <span class="text-gray-400 font-normal">（8文字以上）</span></label>
        <input type="password" name="password" class="input-field" placeholder="新しいパスワード" required minlength="8" autofocus>
      </div>
      <div class="mb-6">
        <label class="block text-sm font-semibold text-gray-700 mb-2">パスワード（確認）</label>
        <input type="password" name="confirm_password" class="input-field" placeholder="もう一度入力" required minlength="8">
      </div>
      <button type="submit" class="btn-primary">パスワードを変更する</button>
    </form>
    {% endif %}

    <p class="text-center text-sm text-gray-500 mt-6">
      <a href="/app-login" class="text-teal-700 font-semibold hover:underline">← ログイン画面に戻る</a>
    </p>
  </div>
</body>
</html>
