<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ミエルーム | パスワードリセット</title>
  <link rel="icon" type="image/png" href="/static/logo_notext.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: linear-gradient(135deg, #0D4A48 0%, #115E59 40%, #0F766E 100%); min-height: 100vh; font-family: system-ui, -apple-system, sans-serif; }
    .card { background: #fff; border-radius: 20px; box-shadow: 0 24px 64px rgba(0,0,0,0.3); padding: 48px 40px; width: 100%; max-width: 420px; }
    .input-field { width: 100%; border: 1.5px solid #d1d5db; border-radius: 10px; padding: 12px 16px; font-size: 15px; color: #111827; outline: none; transition: border-color 0.2s, box-shadow 0.2s; background: #f9fafb; box-sizing: border-box; }
    .input-field:focus { border-color: #0D9488; box-shadow: 0 0 0 3px rgba(22,163,74,0.15); background: #fff; }
    .btn-primary { width: 100%; background: #0D9488; color: #fff; border: none; border-radius: 10px; padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; transition: background 0.2s; }
    .btn-primary:hover { background: #0F766E; }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
  <div class="card">
    <div class="text-center mb-8">
      <div style="width:64px;height:64px;background:linear-gradient(135deg,#0D9488,#0F766E);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;box-shadow:0 8px 24px rgba(22,163,74,0.35);">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-gray-900">パスワードリセット</h1>
      <p class="text-sm text-gray-500 mt-1">登録したメールアドレスを入力してください</p>
    </div>

    {% if message %}
    <div style="background:#CCFBF1; border:1px solid #5EEAD4; border-radius:8px; padding:12px 16px; margin-bottom:20px; color:#0F766E; font-size:14px; text-align:center;">
      {{ message }}
    </div>
    {% endif %}

    <form method="POST">
      <div class="mb-6">
        <label class="block text-sm font-semibold text-gray-700 mb-2">メールアドレス</label>
        <input type="email" name="email" class="input-field" placeholder="example@company.com" required autofocus>
      </div>
      <button type="submit" class="btn-primary">リセットメールを送信</button>
    </form>

    <p class="text-center text-sm text-gray-500 mt-6">
      <a href="/app-login" class="text-teal-700 font-semibold hover:underline">← ログイン画面に戻る</a>
    </p>
  </div>
</body>
</html>
