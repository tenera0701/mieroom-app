{% extends 'mgmt_base.html' %}
{% block title %}カレンダー | ミエルーム管理ツール{% endblock %}
{% block breadcrumb %}カレンダー{% endblock %}

{% block extra_head %}
<style>
  :root { --primary:#0D9488; --primary-dark:#0F766E; }
  .rv-head { display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:12px; }
  .rv-title { font-size:20px; font-weight:800; color:#111827; margin:0 14px 0 0; }
  .btn { display:inline-flex; align-items:center; gap:5px; border:1px solid #d1d5db; background:#fff; color:#374151; border-radius:8px; padding:7px 12px; font-size:13px; font-weight:700; cursor:pointer; }
  .btn:hover { background:#F0FDFA; border-color:#5EEAD4; }
  .btn.primary { background:var(--primary); color:#fff; border-color:var(--primary); }
  .btn.danger { color:#ef4444; border-color:#fca5a5; }
  .btn.sm { padding:4px 8px; font-size:11px; border-radius:6px; }
  .nav-round { width:34px; height:34px; border-radius:50%; border:none; background:#fff; font-size:16px; cursor:pointer; color:#374151; }
  .nav-round:hover { background:#f1f5f9; }
  .cal-title { font-size:18px; font-weight:800; color:#111827; min-width:150px; }
  .view-switch { display:flex; border:1px solid #d1d5db; border-radius:9px; overflow:hidden; margin-left:auto; }
  .view-switch button { border:none; background:#fff; padding:8px 16px; font-size:13px; font-weight:700; color:#374151; cursor:pointer; }
  .view-switch button.on { background:var(--primary); color:#fff; }
  .panel { background:#fff; border:1px solid #e5e7eb; border-radius:12px; padding:12px; }

  /* ── 画面いっぱいに広げる（PC幅に応じて伸縮・縦も画面ぴったり） ── */
  .rv-page { width:100%; display:flex; flex-direction:column; height:calc(100vh - 137px); }
  /* ── 2カラムレイアウト（左サイドバー＋カレンダー本体） ── */
  .rv-layout { display:flex; gap:16px; align-items:stretch; flex:1; min-height:0; }
  .rv-side { width:236px; flex:none; overflow-y:auto; }
  .rv-main { flex:1; min-width:0; display:flex; flex-direction:column; }
  .rv-main .panel { flex:1; display:flex; flex-direction:column; min-height:0; }
  #view-month { flex:1; min-height:0; display:flex; flex-direction:column; }
  #view-month table.cal { flex:1; height:100%; }
  #view-time { flex:1; min-height:0; overflow:auto; }
  /* 作成ボタン（Googleカレンダー風） */
  .create-btn { display:inline-flex; align-items:center; gap:9px; border:1px solid #e5e7eb; background:#fff; color:#1f2937; border-radius:28px; padding:13px 22px 13px 16px; font-size:15px; font-weight:700; cursor:pointer; box-shadow:0 1px 3px rgba(0,0,0,.13); margin-bottom:16px; }
  .create-btn:hover { box-shadow:0 2px 8px rgba(0,0,0,.18); background:#F8FFFE; }
  .create-btn .plus { font-size:22px; color:var(--primary); line-height:1; }
  /* ミニカレンダー */
  .mini { background:#fff; border:1px solid #e5e7eb; border-radius:12px; padding:10px 11px; margin-bottom:16px; }
  .mini-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
  .mini-title { font-size:13px; font-weight:800; color:#111827; }
  .mini-nav { width:26px; height:26px; border:none; background:transparent; border-radius:50%; cursor:pointer; color:#374151; font-size:14px; }
  .mini-nav:hover { background:#f1f5f9; }
  table.mini-grid { width:100%; border-collapse:collapse; table-layout:fixed; }
  .mini-grid th { font-size:10px; color:#9ca3af; font-weight:700; padding:2px 0; text-align:center; }
  .mini-grid th.sun { color:#f87171; } .mini-grid th.sat { color:#60a5fa; }
  .mini-grid td { text-align:center; padding:1px 0; }
  .mini-day { width:24px; height:24px; line-height:24px; display:inline-block; font-size:11px; border-radius:50%; cursor:pointer; color:#374151; }
  .mini-day:hover { background:#F0FDFA; }
  .mini-day.other { color:#cbd5e1; }
  .mini-day.sun { color:#dc2626; } .mini-day.sat { color:#2563eb; }
  .mini-day.today { background:#CCFBF1; color:#0F766E; font-weight:800; }
  .mini-day.sel { background:var(--primary); color:#fff; font-weight:800; }
  .mini-day.has::after { content:''; display:block; width:4px; height:4px; border-radius:50%; background:var(--primary); margin:-3px auto 0; }
  /* スタッフ一覧（色分け） */
  .side-sec { background:#fff; border:1px solid #e5e7eb; border-radius:12px; padding:11px 12px; }
  .side-sec-title { font-size:12px; font-weight:800; color:#6b7280; margin:0 0 8px; letter-spacing:.03em; }
  .staff-item { display:flex; align-items:center; gap:8px; padding:5px 2px; cursor:pointer; user-select:none; }
  .staff-item:hover { background:#f8fafc; border-radius:6px; }
  .staff-box { width:16px; height:16px; border-radius:5px; flex:none; border:2px solid; display:flex; align-items:center; justify-content:center; }
  .staff-box svg { width:11px; height:11px; color:#fff; display:none; }
  .staff-item.on .staff-box svg { display:block; }
  .staff-name { font-size:13px; color:#374151; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; }
  .staff-item.off .staff-name { color:#9ca3af; }
  .staff-del { border:none; background:transparent; color:#cbd5e1; cursor:pointer; font-size:13px; padding:0 2px; opacity:0; flex:none; }
  .staff-item:hover .staff-del { opacity:1; }
  .staff-del:hover { color:#ef4444; }
  .staff-color { border:none; background:transparent; cursor:pointer; font-size:12px; padding:0 2px; opacity:0; flex:none; }
  .staff-item:hover .staff-color { opacity:1; }
  .staff-add { display:flex; align-items:center; gap:6px; width:100%; margin-top:8px; border:1px dashed #cbd5e1; background:#fff; color:#0F766E; border-radius:8px; padding:7px 10px; font-size:12px; font-weight:700; cursor:pointer; }
  .staff-add:hover { background:#F0FDFA; border-color:#5EEAD4; }

  /* 月表示 */
  table.cal { width:100%; border-collapse:collapse; table-layout:fixed; }
  .cal th { font-size:11px; color:#6b7280; padding:6px 0; border-bottom:1px solid #e5e7eb; font-weight:700; }
  .cal th.sun { color:#dc2626; } .cal th.sat { color:#2563eb; }
  .cal td { height:104px; vertical-align:top; border:1px solid #f1f5f9; padding:3px 4px; cursor:pointer; }
  .cal td:hover { background:#F8FFFE; }
  .cal td.other-month { background:#fcfcfd; }
  .cal td.other-month .dnum { color:#cbd5e1; }
  .cal td.today .dnum { background:var(--primary); color:#fff; border-radius:50%; }
  .dnum { font-size:12px; font-weight:700; width:22px; height:22px; display:inline-flex; align-items:center; justify-content:center; }
  td.sun-col .dnum { color:#dc2626; } td.sat-col .dnum { color:#2563eb; }
  .rv-chip { display:flex; align-items:center; gap:4px; font-size:10.5px; border-radius:5px; padding:1px 6px; margin-top:2px; overflow:hidden; white-space:nowrap; font-weight:700; cursor:pointer; border-left:3px solid; }
  .rv-chip .ctxt { overflow:hidden; text-overflow:ellipsis; }
  .rv-chip:hover { filter:brightness(0.95); }
  .rv-chip.cancel { text-decoration:line-through; opacity:.7; }
  .rv-chip .chip-new { flex:none; background:#ef4444; color:#fff; border-radius:4px; padding:0 3px; font-size:8.5px; font-weight:800; }
  .rv-chip .chip-web { flex:none; margin-left:auto; background:#0D9488; color:#fff; border-radius:4px; padding:0 3px; font-size:8.5px; font-weight:800; }
  /* 週・日表示（時間グリッド） */
  .tg-wrap { overflow-x:auto; }
  .tg { display:grid; min-width:560px; }
  .tg .tg-headcell { border-bottom:1px solid #e5e7eb; text-align:center; font-size:12px; font-weight:700; color:#374151; padding:7px 2px; position:sticky; top:0; background:#fff; z-index:5; }
  .tg .tg-corner { position:sticky; top:0; left:0; background:#fff; z-index:6; }
  .tg .tg-headcell .dn { font-size:16px; }
  .tg .tg-headcell.today .dn { background:var(--primary); color:#fff; border-radius:50%; display:inline-flex; width:26px; height:26px; align-items:center; justify-content:center; }
  .tg .tg-headcell.sun { color:#dc2626; } .tg .tg-headcell.sat { color:#2563eb; }
  .tg-time { font-size:10px; color:#94a3b8; text-align:right; padding-right:6px; transform:translateY(-6px); }
  .tg-cell { border-left:1px solid #f1f5f9; border-top:1px solid #f1f5f9; position:relative; cursor:pointer; }
  .tg-cell:hover { background:#F8FFFE; }
  .tg-col { position:relative; }
  .tg-ev { position:absolute; left:3px; right:3px; border-left:3px solid; border-radius:6px; padding:3px 6px; font-size:11px; font-weight:700; overflow:hidden; cursor:grab; box-shadow:0 1px 3px rgba(0,0,0,.08); z-index:2; touch-action:none; user-select:none; }
  .tg-ev:hover { filter:brightness(0.96); }
  .tg-ev.dragging { cursor:grabbing; opacity:.92; box-shadow:0 8px 22px rgba(0,0,0,.22); z-index:20; filter:none; }
  .tg-ev.cancel { text-decoration:line-through; opacity:.7; }
  .tg-ev .ev-nm { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .tg-ev .ev-t { font-size:10px; font-weight:600; opacity:.85; }
  /* Web予約バッジ（右）・NEWバッジ（左上） */
  .tg-ev .ev-web { position:absolute; right:3px; top:3px; background:#0D9488; color:#fff; font-size:8.5px; font-weight:800; letter-spacing:.02em; padding:1px 5px; border-radius:6px; line-height:1.6; pointer-events:none; box-shadow:0 1px 2px rgba(0,0,0,.18); }
  .tg-ev .ev-new { position:absolute; left:3px; top:3px; background:#ef4444; color:#fff; font-size:8.5px; font-weight:800; padding:1px 5px; border-radius:6px; line-height:1.6; pointer-events:none; box-shadow:0 1px 3px rgba(0,0,0,.25); animation:evNewPulse 1.5s ease-in-out infinite; }
  @keyframes evNewPulse { 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.12); } }
  .tg-ev.is-new .ev-nm { padding-left:42px; }
  .tg-ev.is-web .ev-nm { padding-right:60px; }
  /* 下端のリサイズハンドル（ここを引っ張ると予約時間を変更） */
  .tg-ev-resize { position:absolute; left:0; right:0; bottom:0; height:9px; cursor:ns-resize; touch-action:none; }
  .tg-ev-resize::after { content:''; display:block; width:22px; height:3px; margin:3px auto 0; border-radius:2px; background:currentColor; opacity:.45; }
  .now-line { position:absolute; left:0; right:0; height:2px; background:#ef4444; z-index:3; pointer-events:none; }
  .alert { padding:9px 14px; border-radius:8px; font-size:13px; margin-bottom:12px; display:none; }
  .alert.show { display:block; }
  .alert-success { background:#CCFBF1; color:#0F766E; border:1px solid #5EEAD4; }
  .alert-error { background:#fee2e2; color:#b91c1c; border:1px solid #fca5a5; }
  /* モーダル */
  .cfg-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:2500; align-items:center; justify-content:center; padding:16px; }
  .cfg-overlay.open { display:flex; }
  .cfg-box { background:#fff; border-radius:14px; width:420px; max-width:100%; max-height:92vh; overflow-y:auto; }
  .cfg-row { display:flex; align-items:center; gap:10px; margin-bottom:12px; flex-wrap:wrap; }
  .cfg-row label { font-size:13px; font-weight:700; color:#374151; min-width:90px; }
  .cfg-row select, .cfg-row input, .cfg-row textarea { font-size:13px; }
  .st-badge { font-size:11px; border-radius:8px; padding:2px 9px; font-weight:700; }
  .st-予約 { background:#CCFBF1; color:#0F766E; }
  .st-来店済 { background:#dbeafe; color:#1d4ed8; }
  .st-キャンセル { background:#fee2e2; color:#b91c1c; }
  /* 狭い画面ではサイドバーを上に積む */
  @media (max-width:900px){
    .rv-page { height:auto; }
    .rv-layout { flex-direction:column; align-items:stretch; }
    .rv-side { width:100%; display:flex; flex-wrap:wrap; gap:12px; align-items:flex-start; overflow:visible; }
    .rv-side .create-btn { margin-bottom:0; }
    .rv-side .mini { margin-bottom:0; flex:1; min-width:220px; }
    .rv-side .side-sec { flex:1; min-width:200px; }
    .rv-main .panel { min-height:70vh; }
    #view-time { max-height:75vh; }
  }
</style>
{% endblock %}

{% block content %}

  <div class="rv-head">

<!-- 予約詳細モーダル -->

{% block extra_scripts %}
<script>
let view = 'month';            // month / week / day
let cur = new Date();          // 表示の基準日
let miniCur = new Date();      // ミニカレンダーの表示月
let RES = [];                  // 取得済み予約（表示範囲分）
let STAFF = [];                // スタッフ一覧
let HIDDEN = new Set();        // 非表示にするスタッフキー（id または 'none'）
const STORE_ID = {{ store_id if store_id else 'null' }};
const HOUR_PX = 44;            // 時間グリッド1時間の高さ
const DAY_START = 0, DAY_END = 24;   // 時間グリッドの表示範囲（0〜24時）
let gridHs = 0, gridHe = 24;   // いま描画中の時間グリッドの開始/終了時
let _drag = null;              // ドラッグ移動・リサイズの状態
let _colorTargetStaff = null;  // 色変更対象スタッフID

/* スタッフ色パレット（solid=濃い色 / light=薄い背景色） */
const PALETTE = [
  {s:'#0D9488', l:'#CCFBF1'}, {s:'#2563eb', l:'#dbeafe'}, {s:'#db2777', l:'#fce7f3'},
  {s:'#d97706', l:'#fef3c7'}, {s:'#7c3aed', l:'#ede9fe'}, {s:'#dc2626', l:'#fee2e2'},
  {s:'#0891b2', l:'#cffafe'}, {s:'#65a30d', l:'#ecfccb'}, {s:'#c026d3', l:'#fae8ff'},
  {s:'#ea580c', l:'#ffedd5'},
];
const UNASSIGNED = {s:'#64748b', l:'#f1f5f9'};
function staffKey(sid){ return (sid===null||sid===undefined||sid==='') ? 'none' : String(sid); }
/* 濃い色から薄い背景色（白寄りにブレンド）を作る */
function tint(hex, amt){
  amt = amt==null ? 0.86 : amt;
  const m = /^#?([0-9a-f]{6})$/i.exec(hex||''); if(!m) return '#f1f5f9';
  const n = parseInt(m[1],16), r=(n>>16)&255, g=(n>>8)&255, b=n&255;
  const mix=(c)=>Math.round(c + (255-c)*amt);
  return `rgb(${mix(r)},${mix(g)},${mix(b)})`;
}
function staffColor(sid){
  if(staffKey(sid)==='none') return UNASSIGNED;
  const s = STAFF.find(s=>String(s.id)===String(sid));
  if(!s) return UNASSIGNED;
  if(s.color) return { s:s.color, l:tint(s.color) };   // カスタム色
  const i = STAFF.findIndex(x=>String(x.id)===String(sid));
  return i>=0 ? PALETTE[i % PALETTE.length] : UNASSIGNED;
}
function staffName(sid){
  if(staffKey(sid)==='none') return '未割り当て';
  const s = STAFF.find(s=>String(s.id)===String(sid));
  return s ? s.name : '（退職スタッフ）';
}

function showAlert(msg, type='success'){
  const el=document.getElementById('alert-msg');
  el.textContent=msg; el.className=`alert alert-${type} show`;
  setTimeout(()=>el.classList.remove('show'), 3500);
}
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function pad(n){ return String(n).padStart(2,'0'); }
function fmt(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function todayS(){ return fmt(new Date()); }
const DOW = ['日','月','火','水','木','金','土'];

/* 表示対象の予約だけに絞る（スタッフフィルタ） */
function visibleRes(){ return RES.filter(r=>!HIDDEN.has(staffKey(r.staff_id))); }

/* ── データ取得（表示範囲の月をまとめて取得） ── */
async function fetchRange(months){
  const seen = new Set(); RES = [];
  for(const [y,m] of months){
    const key = y+'-'+m; if(seen.has(key)) continue; seen.add(key);
    try{
      const rows = await fetch(`/api/reservations?year=${y}&month=${m}`).then(r=>r.json());
      RES = RES.concat(rows||[]);
    }catch(_){}
  }
}
function monthsForView(){
  if(view==='month'){
    // 前月・当月・翌月を取得（カレンダーのはみ出し日にも予約を表示するため）
    const base=new Date(cur.getFullYear(), cur.getMonth(), 1);
    const arr=[];
    for(let d=-1; d<=1; d++){ const x=new Date(base.getFullYear(), base.getMonth()+d, 1); arr.push([x.getFullYear(), x.getMonth()+1]); }
    return arr;
  }
  if(view==='week'){
    const s = weekStart(cur), e = new Date(s); e.setDate(e.getDate()+6);
    return [[s.getFullYear(), s.getMonth()+1],[e.getFullYear(), e.getMonth()+1]];
  }
  return [[cur.getFullYear(), cur.getMonth()+1]];
}
function weekStart(d){ const s=new Date(d); s.setDate(s.getDate()-s.getDay()); return s; }   // 日曜始まり

async function refresh(){
  await fetchRange(monthsForView());
  renderTitle();
  miniCur = new Date(cur.getFullYear(), cur.getMonth(), 1);
  renderMini();
  if(view==='month'){ document.getElementById('view-month').style.display=''; document.getElementById('view-time').style.display='none'; renderMonth(); }
  else { document.getElementById('view-month').style.display='none'; document.getElementById('view-time').style.display=''; renderTimeGrid(); }
}
function renderTitle(){
  const t=document.getElementById('cal-title');
  if(view==='month') t.textContent = `${cur.getFullYear()}年 ${cur.getMonth()+1}月`;
  else if(view==='week'){
    const s=weekStart(cur), e=new Date(s); e.setDate(e.getDate()+6);
    t.textContent = s.getMonth()===e.getMonth()
      ? `${s.getFullYear()}年 ${s.getMonth()+1}月${s.getDate()}日〜${e.getDate()}日`
      : `${s.getMonth()+1}/${s.getDate()} 〜 ${e.getMonth()+1}/${e.getDate()}`;
  } else t.textContent = `${cur.getFullYear()}年 ${cur.getMonth()+1}月${cur.getDate()}日（${DOW[cur.getDay()]}）`;
}
function setView(v){

function nav(d){
  if(view==='month') cur.setMonth(cur.getMonth()+d);
  else if(view==='week') cur.setDate(cur.getDate()+7*d);

  refresh();

/* ── ミニカレンダー ── */
function renderMini(){
  document.getElementById('mini-title').textContent = `${miniCur.getFullYear()}年 ${miniCur.getMonth()+1}月`;
  const y=miniCur.getFullYear(), m=miniCur.getMonth();
  const first=new Date(y,m,1), startDow=first.getDay();
  const daysIn=new Date(y,m+1,0).getDate();
  const prevDays=new Date(y,m,0).getDate();
  const hasRes = new Set(visibleRes().map(r=>r.date));
  let html='', cell=0;
  for(let w=0;w<6;w++){
    html+='<tr>';
    for(let dow=0;dow<7;dow++,cell++){
      let day, mm=m, yy=y, other=false;
      if(cell<startDow){ day=prevDays-startDow+1+cell; mm=m-1; other=true; }
      else if(cell-startDow>=daysIn){ day=cell-startDow-daysIn+1; mm=m+1; other=true; }
      else day=cell-startDow+1;
      const dd=new Date(yy,mm,day); const ds=fmt(dd);
      let cls='mini-day';
      if(other) cls+=' other';
      else { if(dow===0) cls+=' sun'; if(dow===6) cls+=' sat'; }
      if(ds===todayS()) cls+=' today';
      if(ds===fmt(cur)) cls+=' sel';
      if(!other && hasRes.has(ds)) cls+=' has';
      html+=`<td><span class="${cls}" onclick="pickMini('${ds}')">${day}</span></td>`;
    }
    html+='</tr>';
    if(cell-startDow>=daysIn) break;
  }
  document.getElementById('mini-body').innerHTML=html;
}
function miniNav(d){ miniCur=new Date(miniCur.getFullYear(), miniCur.getMonth()+d, 1); renderMini(); }

/* ── 月表示（常に6週ぶん描画。前月末・翌月頭の日付も埋める） ── */
function renderMonth(){
  const y=cur.getFullYear(), m=cur.getMonth();   // m は0始まり
  const first=new Date(y,m,1);
  const startDow=first.getDay();
  const byDate={};
  visibleRes().forEach(r=>{ (byDate[r.date]=byDate[r.date]||[]).push(r); });
  let html='', cell=0;
  for(let w=0;w<6;w++){
    html+='<tr>';
    for(let dow=0;dow<7;dow++,cell++){
      const dd=new Date(y, m, 1 + (cell-startDow));   // 前月・翌月もDateでまたいでOK
      const ds=fmt(dd);
      const inMonth = dd.getMonth()===m;
      const items=(byDate[ds]||[]).slice().sort((a,b)=>(a.time_slot||'').localeCompare(b.time_slot||''));
      const chips=items.slice(0,3).map(r=>{
        const c=staffColor(r.staff_id);
        const cls=r.status==='キャンセル'?'cancel':'';
        const isWeb=r.source==='web';
        const isNew=isWeb && r.status==='予約';
        return `<span class="rv-chip ${cls}" style="background:${c.l};color:${c.s};border-left-color:${c.s};" onclick="event.stopPropagation();openDetail(${r.id})">${isNew?'<span class="chip-new">NEW</span>':''}<span class="ctxt">${esc(r.time_slot)} ${esc(r.customer_name)}</span>${isWeb?'<span class="chip-web">Web</span>':''}</span>`;
      }).join('') + (items.length>3?`<span style="font-size:10px;color:#6b7280;">他${items.length-3}件</span>`:'');
      const colCls = dow===0?'sun-col':(dow===6?'sat-col':'');
      const todayCls = ds===todayS()?'today':'';
      const otherCls = inMonth?'':'other-month';
      html+=`<td class="${todayCls} ${colCls} ${otherCls}" onclick="openDay('${ds}')">
        <span class="dnum">${dd.getDate()}</span>${chips}</td>`;
    }
    html+='</tr>';
  }
  document.getElementById('cal-body').innerHTML=html;
}
function openDay(ds){ cur=new Date(ds+'T00:00:00'); setView('day'); }

/* ── 週・日表示（時間グリッド） ── */
function tParse(t){ const [h,mi]=(t||'0:0').split(':').map(Number); return h+mi/60; }
function renderTimeGrid(){
  const days = [];
  if(view==='week'){ const s=weekStart(cur); for(let i=0;i<7;i++){ const d=new Date(s); d.setDate(d.getDate()+i); days.push(d); } }
  else days.push(new Date(cur));
  const shown = visibleRes();

  // 表示時間範囲（予約がはみ出す場合は広げる）
  let hs=DAY_START, he=DAY_END;
  shown.forEach(r=>{ if(days.some(d=>fmt(d)===r.date)){ const t=tParse(r.time_slot); hs=Math.min(hs, Math.floor(t)); he=Math.max(he, Math.ceil(t+1)); } });
  gridHs=hs; gridHe=he;

  const tg=document.getElementById('tg');
  tg.style.gridTemplateColumns = `52px repeat(${days.length}, 1fr)`;
  let html = '<div class="tg-corner"></div>';   // 左上の空き（スクロールしても固定）
  days.forEach(d=>{
    const isT = fmt(d)===todayS();
    const cls = d.getDay()===0?'sun':(d.getDay()===6?'sat':'');
    html += `<div class="tg-headcell ${cls} ${isT?'today':''}" style="cursor:pointer;" onclick="cur=new Date('${fmt(d)}T00:00:00');setView('day')">${DOW[d.getDay()]}<br><span class="dn">${d.getDate()}</span></div>`;
  });
  // 本体: 時間ラベル列＋日列（各日列はrelativeな1つの大きなセルにイベントを絶対配置）
  const totalH=(he-hs)*HOUR_PX;
  html += `<div style="position:relative;height:${totalH}px;">`;
  for(let h=hs;h<he;h++) html+=`<div class="tg-time" style="position:absolute;top:${(h-hs)*HOUR_PX}px;right:0;">${h}:00</div>`;
  html += '</div>';
  days.forEach(d=>{
    const ds=fmt(d);
    let col = `<div class="tg-col" data-date="${ds}" style="height:${totalH}px;">`;
    for(let h=hs;h<he;h++){
      col+=`<div class="tg-cell" style="position:absolute;top:${(h-hs)*HOUR_PX}px;left:0;right:0;height:${HOUR_PX}px;" onclick="quickAdd('${ds}','${pad(h)}:00')"></div>`;
    }
    // 予約ブロック（ドラッグで移動／下端を引っ張って時間変更）
    shown.filter(r=>r.date===ds).forEach(r=>{
      const t=tParse(r.time_slot);
      const top=(t-hs)*HOUR_PX+1;
      const durMin=r.duration_min||60;
      const h=Math.max(HOUR_PX*durMin/60-2, 22);
      const c=staffColor(r.staff_id);
      const isWeb=r.source==='web';
      const isNew=isWeb && r.status==='予約';   // Web予約でまだ未対応（予約のまま）＝新着
      const cls=`${r.status==='キャンセル'?'cancel':''} ${isWeb?'is-web':''} ${isNew?'is-new':''}`;
      col+=`<div class="tg-ev ${cls}" data-id="${r.id}" style="top:${top}px;height:${h}px;background:${c.l};border-left-color:${c.s};color:${c.s};" onpointerdown="evDown(event, ${r.id})" title="ドラッグで移動・下端で時間変更">
        ${isNew?'<span class="ev-new">NEW</span>':''}${isWeb?'<span class="ev-web">WEB予約</span>':''}
        <div class="ev-nm">${esc(r.customer_name)} 様</div><div class="ev-t">${esc(r.time_slot)}〜</div>
        <div class="tg-ev-resize" onpointerdown="evResizeDown(event, ${r.id})"></div></div>`;
    });
    // 現在時刻ライン
    if(ds===todayS()){
      const now=new Date(); const nt=now.getHours()+now.getMinutes()/60;
      if(nt>=hs&&nt<=he) col+=`<div class="now-line" style="top:${(nt-hs)*HOUR_PX}px;"></div>`;
    }
    col+='</div>';
    html+=col;
  });
  tg.innerHTML=html;
  // 24時間表示は縦に長いので、初期表示は8時付近までスクロール
  const vt=document.getElementById('view-time');
  if(vt) vt.scrollTop = Math.max(0, (8-hs)*HOUR_PX - 8);
}
function quickAdd(ds, time){
  document.getElementById('add-date').value=ds;
  document.getElementById('add-time').value=time;
  document.getElementById('add-staff').innerHTML=staffOptions(null);

/* ── 予約ブロックのドラッグ移動・リサイズ ── */
function snap15(hrs){ return Math.round(hrs*4)/4; }   // 15分刻み
function hrsToHHMM(hrs){ hrs=Math.max(0,Math.min(23.9999,hrs)); const h=Math.floor(hrs); const m=Math.round((hrs-h)*60); return pad(h)+':'+pad(m); }
function collectCols(){ return [...document.querySelectorAll('.tg-col')].map(c=>({ date:c.dataset.date, rect:c.getBoundingClientRect() })); }
function evDown(e, id){
  if(e.button!==undefined && e.button!==0) return;
  e.stopPropagation();
  const ev=e.currentTarget;
  _drag={ mode:'move', id, ev, startX:e.clientX, startY:e.clientY, moved:false,
          origTop:parseFloat(ev.style.top), cols:collectCols() };
  try{ ev.setPointerCapture(e.pointerId); }catch(_){}
  ev.addEventListener('pointermove', evMove);
  ev.addEventListener('pointerup', evUp);
}
function evResizeDown(e, id){
  if(e.button!==undefined && e.button!==0) return;
  e.stopPropagation();
  const ev=e.currentTarget.parentElement;
  _drag={ mode:'resize', id, ev, startX:e.clientX, startY:e.clientY, moved:false,
          origH:parseFloat(ev.style.height) };
  try{ ev.setPointerCapture(e.pointerId); }catch(_){}
  ev.addEventListener('pointermove', evMove);
  ev.addEventListener('pointerup', evUp);
}
function evMove(e){
  if(!_drag) return;
  const dx=e.clientX-_drag.startX, dy=e.clientY-_drag.startY;
  if(!_drag.moved && Math.abs(dx)<4 && Math.abs(dy)<4) return;
  _drag.moved=true; _drag.ev.classList.add('dragging');
  if(_drag.mode==='move') _drag.ev.style.top=(_drag.origTop+dy)+'px';
  else _drag.ev.style.height=Math.max(_drag.origH+dy, HOUR_PX*0.25)+'px';
}
function evUp(e){
  if(!_drag) return;
  const d=_drag; _drag=null;
  try{ d.ev.releasePointerCapture(e.pointerId); }catch(_){}
  d.ev.removeEventListener('pointermove', evMove);
  d.ev.removeEventListener('pointerup', evUp);
  d.ev.classList.remove('dragging');
  if(!d.moved){ openDetail(d.id); return; }   // 動かさなければ詳細を開く
  if(d.mode==='move'){
    const newTopPx=parseFloat(d.ev.style.top);
    const newTime=hrsToHHMM(snap15(gridHs+newTopPx/HOUR_PX));
    let target=d.cols.find(c=> e.clientX>=c.rect.left && e.clientX<=c.rect.right);
    if(!target) target=d.cols.find(c=>c.date===(RES.find(x=>x.id===d.id)||{}).date) || d.cols[0];
    saveMove(d.id, target.date, newTime);
  } else {
    let durMin=Math.round((parseFloat(d.ev.style.height)/HOUR_PX*60)/15)*15;
    durMin=Math.max(15, Math.min(24*60, durMin));
    saveDuration(d.id, durMin);
  }
}
async function saveMove(id, date, time){
  try{
    const res=await fetch(`/api/reservations/${id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({date, time_slot:time})});
    if(!res.ok) throw new Error();
    const r=RES.find(x=>x.id===id); if(r){ r.date=date; r.time_slot=time; }
    renderTimeGrid(); renderMini();
    showAlert(`予約を ${date} ${time} に移動しました。`);
  }catch(_){ showAlert('移動に失敗しました','error'); renderTimeGrid(); }
}
async function saveDuration(id, durMin){
  try{
    const res=await fetch(`/api/reservations/${id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({duration_min:durMin})});
    if(!res.ok) throw new Error();
    const r=RES.find(x=>x.id===id); if(r){ r.duration_min=durMin; }
    renderTimeGrid();
    const hh=Math.floor(durMin/60), mm=durMin%60;
    showAlert(`予約時間を ${hh?hh+'時間':''}${mm?mm+'分':''} に変更しました。`);
  }catch(_){ showAlert('時間変更に失敗しました','error'); renderTimeGrid(); }
}

        staff_id:document.getElementById('add-staff').value,
        customer_name:name, phone:document.getElementById('add-phone').value, memo:document.getElementById('add-memo').value})});
    if(!r.ok) throw new Error();
    closeAdd();
    cur=new Date(document.getElementById('add-date').value+'T00:00:00');
    refresh(); showAlert('予約を追加しました。');
  }catch(_){ showAlert('追加に失敗しました','error'); }
}

async function loadStaff(){
  try{ STAFF = await fetch('/api/staff').then(r=>r.json()) || []; }catch(_){ STAFF = []; }
  renderStaffList();
}

document.addEventListener('DOMContentLoaded', async ()=>{ await loadStaff(); refresh(); });
</script>
