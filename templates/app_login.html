<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ログイン | 管理ポータル</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: linear-gradient(135deg, #14532d 0%, #166534 40%, #15803d 100%);
      min-height: 100vh;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .login-card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.3);
      padding: 48px 40px;
      width: 100%;
      max-width: 440px;
    }
    .input-wrap { position: relative; }
    .input-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #9ca3af; pointer-events: none; }
    .input-field {
      width: 100%;
      border: 1.5px solid #d1d5db;
      border-radius: 10px;
      padding: 12px 16px 12px 42px;
      font-size: 15px;
      color: #111827;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: #f9fafb;
      box-sizing: border-box;
    }
    .input-field:focus {
      border-color: #16a34a;
      box-shadow: 0 0 0 3px rgba(22,163,74,0.15);
      background: #fff;
    }
    .btn-login {
      width: 100%;
      background: #16a34a;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-login:hover { background: #15803d; }
    .btn-login:active { transform: scale(0.99); }
    .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; }
    .divider::before, .divider::after { content: ''; flex: 1; border-top: 1px solid #e5e7eb; }
    .divider span { font-size: 12px; color: #9ca3af; white-space: nowrap; }
    .eye-btn { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #9ca3af; padding: 2px; }
    .eye-btn:hover { color: #6b7280; }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

  <div class="login-card">
    <!-- ロゴ -->
    <div class="text-center mb-8">
      <div style="width:68px;height:68px;background:linear-gradient(135deg,#16a34a,#15803d);border-radius:18px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;box-shadow:0 8px 24px rgba(22,163,74,0.4);">
        <svg class="w-9 h-9" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-gray-900">管理ポータル</h1>
      <p class="text-sm text-gray-400 mt-1">ミエルーム 不動産管理システム</p>
    </div>

    <!-- パスワードリセット完了メッセージ -->
    {% if request.args.get('reset') %}
    <div style="background:#dcfce7;border:1px solid #86efac;border-radius:8px;padding:12px 16px;margin-bottom:20px;color:#15803d;font-size:14px;text-align:center;display:flex;align-items:center;gap:8px;justify-content:center;">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
      パスワードを変更しました。新しいパスワードでログインしてください。
    </div>
    {% endif %}

    <!-- エラーメッセージ -->
    {% if error %}
    <div style="background:#fee2e2;border:1px solid #fca5a5;border-radius:8px;padding:12px 16px;margin-bottom:20px;color:#b91c1c;font-size:14px;text-align:center;display:flex;align-items:center;gap:8px;justify-content:center;">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      {{ error }}
    </div>
    {% endif %}

    <!-- ログインフォーム -->
    <form method="POST" action="/app-login">
      <div class="mb-4">
        <label class="block text-sm font-semibold text-gray-700 mb-2">ユーザー名またはメールアドレス</label>
        <div class="input-wrap">
          <svg class="input-icon w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
          </svg>
          <input
            type="text"
            name="username"
            class="input-field"
            placeholder="ユーザー名 または メールアドレス"
            autocomplete="username"
            autofocus
            required
          >
        </div>
      </div>

      <div class="mb-2">
        <label class="block text-sm font-semibold text-gray-700 mb-2">パスワード</label>
        <div class="input-wrap" style="position:relative;">
          <svg class="input-icon w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
          </svg>
          <input
            type="password"
            name="password"
            id="password-input"
            class="input-field"
            placeholder="パスワードを入力"
            autocomplete="current-password"
            style="padding-right: 42px;"
            required
          >
          <button type="button" class="eye-btn" onclick="togglePassword()" title="パスワードを表示">
            <svg id="eye-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- パスワードを忘れた -->
      <div class="text-right mb-6">
        <a href="/forgot-password" class="text-sm text-green-700 hover:underline font-medium">パスワードを忘れた方</a>
      </div>

      <button type="submit" class="btn-login">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/>
        </svg>
        ログイン
      </button>
    </form>

    <p class="text-center text-xs text-gray-400 mt-8">
      © 2026 管理ポータル — Powered by RoomPick
    </p>
  </div>

  <script>
    function togglePassword() {
      const input = document.getElementById('password-input');
      const icon  = document.getElementById('eye-icon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>`;
      } else {
        input.type = 'password';
        icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>`;
      }
    }
  </script>
</body>
</html>
